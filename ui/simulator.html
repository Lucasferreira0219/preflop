<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador Preflop MTT</title>
  <link rel="stylesheet" href="simulator.css?v=1779844000"/>
</head>
<body>

<!-- DRAWER OVERLAY -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<nav id="drawer">
  <div class="drawer-header">
    <span class="drawer-logo">♠ PREFLOP</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <button class="drawer-item active" onclick="closeDrawer()">Simulador</button>
  <button class="drawer-item" onclick="PreflopAPI.navigate('main');closeDrawer()">Consulta</button>
  <button class="drawer-item" onclick="showAnalytics();closeDrawer()">Análises</button>
  <button class="drawer-item" onclick="PreflopAPI.navigate('launcher');closeDrawer()">Início</button>
</nav>

<div id="app">

  <!-- HEADER 48px -->
  <header>
    <div class="header-brand">
      <span class="header-suit">♠</span>
      <span class="app-title">SIMULADOR</span>
      <span class="app-sub">MTT</span>
    </div>
    <div class="header-controls">
      <div class="stack-ctrl">
        <label>Stack:</label>
        <select id="stackSelect">
          <option value="0">Aleatório</option>
          <option value="20">20bb</option>
          <option value="35" selected>35bb</option>
          <option value="50">50bb</option>
          <option value="100">100bb</option>
        </select>
      </div>
      <button id="focusBtn" class="btn-ghost btn-focus" title="Modo focado">⊙</button>
      <button id="resetBtn" class="btn-ghost" title="Resetar">↺</button>
      <button id="analyticsBtn" class="btn-ghost btn-analytics" title="Análise">≡</button>
    </div>
    <button class="hamburger" onclick="openDrawer()">☰</button>
  </header>

  <!-- FOCUS PANEL -->
  <div id="focusPanel" class="focus-panel hidden">
    <div class="focus-panel-row">
      <label class="focus-label">Posição:</label>
      <select id="focusPosSelect" class="focus-select">
        <option value="">Aleatória</option>
        <option value="UTG">UTG</option>
        <option value="UTG1">UTG+1</option>
        <option value="UTG2">UTG+2</option>
        <option value="MP">MP</option>
        <option value="HJ">HJ</option>
        <option value="CO">CO</option>
        <option value="BTN">BTN</option>
        <option value="SB">SB</option>
        <option value="BB">BB</option>
      </select>
    </div>
    <div class="focus-panel-row">
      <label class="focus-label">Situação:</label>
      <select id="focusScenarioSelect" class="focus-select">
        <option value="">Aleatória</option>
        <option value="RFI">RFI (Eu abro)</option>
        <option value="vs_RFI">vs RFI</option>
        <option value="vs_3bet">vs 3-Bet</option>
      </select>
    </div>
    <div class="focus-panel-row">
      <span class="focus-label">SM-2 priorizando mãos fracas:</span>
      <span class="focus-sm2-badge" id="sm2Badge">—</span>
    </div>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-pill stat-pct">
      <span class="stat-pill-icon">✓</span>
      <span class="stat-val" id="statPct">—</span>
    </div>
    <div class="stat-pill stat-streak" title="Sequência de acertos consecutivos">
      <span class="stat-pill-icon stat-icon-streak">streak</span>
      <span class="stat-val" id="statStreak">0</span>
    </div>
    <div class="stat-pill stat-total">
      <span class="stat-pill-icon stat-icon-total">#</span>
      <span class="stat-val" id="statTotal">0</span>
    </div>
    <span id="statCorrect" class="stat-hidden">0</span>
    <span id="statWrong"   class="stat-hidden">0</span>
  </div>

  <!-- MAIN -->
  <main>

    <!-- TELA: pergunta -->
    <div id="screenQuestion" class="screen screen-question">

      <!-- Card central de decisão -->
      <div class="decision-card">

        <!-- Linha de contexto: stack · posição · situação -->
        <div class="dc-context">
          <span class="dc-chip dc-stack" id="sitStack"></span>
          <span class="dc-sep">·</span>
          <span class="dc-chip dc-pos" id="sitPos"></span>
          <span class="dc-sep">·</span>
          <span class="dc-chip dc-scen" id="sitScenario"></span>
        </div>

        <!-- Mini tira de posições (gerada por JS via renderPosStrip) -->
        <div class="pos-strip" id="posStrip"></div>

        <!-- Cartas do herói -->
        <div class="hero-cards-display" id="heroCardsDisplay">
          <div class="hero-card" id="hCard1">
            <div class="hc-tl">
              <span class="hc-rank" id="hRank1"></span>
              <span class="hc-suit-sm" id="hSuit1"></span>
            </div>
            <div class="hc-center" id="hCenterSuit1"></div>
            <div class="hc-br">
              <span class="hc-rank" id="hRank1b"></span>
              <span class="hc-suit-sm" id="hSuit1b"></span>
            </div>
          </div>
          <div class="hero-card" id="hCard2">
            <div class="hc-tl">
              <span class="hc-rank" id="hRank2"></span>
              <span class="hc-suit-sm" id="hSuit2"></span>
            </div>
            <div class="hc-center" id="hCenterSuit2"></div>
            <div class="hc-br">
              <span class="hc-rank" id="hRank2b"></span>
              <span class="hc-suit-sm" id="hSuit2b"></span>
            </div>
          </div>
        </div>

        <div class="dc-prompt">Qual é a sua ação?</div>
      </div>

      <!-- Botões em fluxo natural, logo abaixo do card -->
      <div class="action-area">
        <div class="action-btns" id="actionBtns"></div>
      </div>

      <!-- SVG oculto — mantido para compatibilidade com renderSimTable() -->
      <svg id="simTable" style="display:none" aria-hidden="true"></svg>

    </div>

    <!-- TELA: resultado -->
    <div id="screenResult" class="screen hidden">

      <!-- Card de veredicto compacto -->
      <div class="result-verdict-card">
        <div class="result-badge" id="resultBadge"></div>
        <div class="result-hand" id="resultHand"></div>
        <div class="result-msg"  id="resultMsg"></div>
      </div>

      <!-- Explicação rica (colapsada por padrão) -->
      <div class="result-explain" id="resultExplain"></div>

      <!-- Resumo de range (sempre visível) -->
      <div class="result-range-summary" id="resultRangeSummary"></div>

      <!-- Toggle + range matrix colapsável -->
      <button class="result-range-toggle" id="rangeToggleBtn">Ver range completo ▾</button>
      <div class="result-grid-wrap hidden" id="resultGridWrap">
        <div id="resultGrid" class="result-grid"></div>
        <div id="resultLegend" class="result-legend"></div>
      </div>

      <button id="nextBtn" class="btn-next">
        Próxima mão →
        <span class="key-hint">espaço</span>
      </button>

    </div>

    <!-- TELA: análise -->
    <div id="screenAnalytics" class="screen screen-analytics hidden">

      <div class="an-header">
        <button id="backBtn" class="btn-ghost">← Voltar</button>
        <span class="an-title">Análise de Desempenho</span>
        <span class="an-range-info" id="anRangeInfo"></span>
      </div>

      <!-- Filtro de período -->
      <div class="an-filters">
        <label class="an-filter-label">Período:</label>
        <div class="an-preset-group" id="anPresetGroup">
          <button class="an-preset active" data-preset="all">Tudo</button>
          <button class="an-preset" data-preset="today">Hoje</button>
          <button class="an-preset" data-preset="7">7 dias</button>
          <button class="an-preset" data-preset="30">30 dias</button>
          <button class="an-preset" data-preset="custom">Personalizado</button>
        </div>
        <div class="an-dates hidden" id="anDates">
          <input type="date" id="anFrom" class="an-date-input"/>
          <span class="an-dates-sep">→</span>
          <input type="date" id="anTo" class="an-date-input"/>
          <button id="anApply" class="btn-ghost an-apply">Aplicar</button>
        </div>
      </div>

      <!-- Cards de resumo -->
      <div class="an-summary" id="anSummary"></div>

      <!-- Card de melhora -->
      <div class="an-section an-improvement-section" id="improvementSection">
        <div class="an-section-title">Evolução — últimos 7 dias vs 7 anteriores</div>
        <div id="improvementBody" class="improvement-body"></div>
      </div>

      <!-- Histórico diário -->
      <div class="an-section" id="dailySection">
        <div class="an-section-title">Precisão por dia</div>
        <div id="chartDaily" class="chart-daily"></div>
      </div>

      <div class="an-section">
        <div class="an-section-title">Por Posição</div>
        <div id="chartPosition" class="chart-bars"></div>
      </div>

      <div class="an-section">
        <div class="an-section-title">Por Cenário</div>
        <div id="chartScenario" class="chart-bars"></div>
      </div>

      <div class="an-section" id="stackSection">
        <div class="an-section-title">Por Stack Depth</div>
        <div id="chartStack" class="chart-bars"></div>
      </div>

      <div class="an-section" id="topHandsSection">
        <div class="an-section-title">Mãos mais erradas</div>
        <div id="chartHands" class="chart-bars"></div>
      </div>

      <div class="an-section" id="mistakesSection">
        <div class="an-section-title">Últimos erros</div>
        <div id="mistakesTable" class="mistakes-table-wrap"></div>
      </div>

      <div class="an-section" id="historySection">
        <div class="an-section-title">Histórico de mãos</div>
        <div id="historyList" class="history-list"></div>
      </div>

    </div>

  </main>
</div>

<script>window._BASE = /^\/preflop(?=\/|$)/.test(location.pathname) ? "/preflop" : "";</script>
<script src="shared/api.js?v=4"></script>
<script src="shared/core.js?v=4"></script>
<script src="simulator.js?v=13"></script>
<script>
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
function showAnalytics(){document.getElementById('analyticsBtn').click();}
</script>
</body>
</html>
