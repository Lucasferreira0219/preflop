<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preflop Ranges MTT</title>
  <link rel="stylesheet" href="style.css?v=12" />
</head>
<body>

<!-- DRAWER OVERLAY -->
<div id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- DRAWER -->
<nav id="drawer">
  <div class="drawer-header">
    <span class="drawer-logo">♠ PREFLOP</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <button class="drawer-item" onclick="PreflopAPI.navigate('sim');closeDrawer()">Simulador</button>
  <button class="drawer-item active" onclick="closeDrawer()">Consulta</button>
  <button class="drawer-item" onclick="PreflopAPI.navigate('sim');closeDrawer()">Análises</button>
  <button class="drawer-item" onclick="PreflopAPI.navigate('launcher');closeDrawer()">Início</button>
</nav>

<div id="app">

  <!-- ── HEADER ── -->
  <header>
    <div class="header-brand">
      <span class="header-suit">♠</span>
      <span class="app-title">CONSULTA</span>
    </div>
    <button class="hamburger" onclick="openDrawer()">☰</button>
  </header>

  <!-- ── FILTER BAR ── -->
  <div class="filter-bar">
    <div class="filter-group filter-mode">
      <span class="filter-label">Modo</span>
      <div class="mode-pills" id="modePills">
        <button class="mode-pill" data-mode="mtt">MTT</button>
        <button class="mode-pill" data-mode="sng">SnG</button>
      </div>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group filter-stack">
      <span class="filter-label">Stack</span>
      <input type="range" id="stackSlider" min="10" max="100" value="35" step="1" />
      <div class="stack-display">
        <span id="stackValue">35</span><span class="bb-label">bb</span>
      </div>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group filter-phase">
      <span class="filter-label">Fase</span>
      <div class="phase-pills" id="phasePills">
        <button class="phase-pill" data-phase="auto">Auto</button>
        <button class="phase-pill" data-phase="early">Early</button>
        <button class="phase-pill" data-phase="middle">Middle</button>
        <button class="phase-pill" data-phase="late">Late/Bolha</button>
        <button class="phase-pill" data-phase="shortstack">Push/Fold</button>
      </div>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group filter-players">
      <span class="filter-label">Jogadores</span>
      <div class="count-pill">
        <button class="count-btn" id="countMinus">−</button>
        <span id="countValue">9</span>
        <button class="count-btn" id="countPlus">+</button>
      </div>
    </div>

    <div class="filter-sep filter-sep-mobile-break"></div>

    <div class="filter-group filter-pos">
      <span class="filter-label">Posição</span>
      <button class="pos-arrow" id="posArrowLeft" title="Posição anterior">←</button>
      <div class="pos-pills" id="posPills"></div>
      <button class="pos-arrow" id="posArrowRight" title="Próxima posição">→</button>
    </div>

    <div class="filter-sep"></div>

    <div class="filter-group filter-villain">
      <span class="filter-label">Vilão</span>
      <button class="pos-arrow" id="villainArrowLeft" title="Vilão anterior">←</button>
      <div class="villain-pills" id="villainPills"></div>
      <button class="pos-arrow" id="villainArrowRight" title="Próximo vilão">→</button>
    </div>

    <button id="resetBtn" class="btn-reset" title="Recomeçar">↺</button>
  </div>

  <main>

    <!-- Placeholder inicial -->
    <div id="gridPlaceholder" class="grid-placeholder">
      <div class="placeholder-cards">♠ ♥ ♦ ♣</div>
      <div class="placeholder-title">Escolha sua posição</div>
      <div class="placeholder-sub">Clique numa posição acima pra ver o range.</div>
    </div>

    <!-- Grade -->
    <div id="gridWrap" class="grid-wrap hidden">
      <div id="scenarioLabel" class="scenario-label"></div>

      <div class="grid-col-labels">
        <div class="grid-corner"></div>
        <div class="rank-label">A</div><div class="rank-label">K</div>
        <div class="rank-label">Q</div><div class="rank-label">J</div>
        <div class="rank-label">T</div><div class="rank-label">9</div>
        <div class="rank-label">8</div><div class="rank-label">7</div>
        <div class="rank-label">6</div><div class="rank-label">5</div>
        <div class="rank-label">4</div><div class="rank-label">3</div>
        <div class="rank-label">2</div>
      </div>

      <div class="grid-with-row-labels">
        <div id="gridRowLabels" class="grid-row-labels"></div>
        <div id="handGrid" class="hand-grid"></div>
      </div>

      <div id="legend" class="legend"></div>
    </div>

    <!-- Insights educacionais (carregados via /api/get_insights) — sempre visíveis, mesmo sem grid -->
    <div id="insights" class="insights hidden"></div>

  </main>
</div>

<div id="tooltip" class="tooltip hidden"></div>

<script>window._BASE = /^\/preflop(?=\/|$)/.test(location.pathname) ? "/preflop" : "";</script>
<script src="shared/api.js?v=4"></script>
<script src="shared/core.js?v=4"></script>
<script src="app.js?v=6"></script>
<script>
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawer-overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawer-overlay').classList.remove('open');}
</script>
</body>
</html>
